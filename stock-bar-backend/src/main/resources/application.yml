spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockbar}
    username: ${SPRING_DATASOURCE_USERNAME:stockbar}
    password: ${SPRING_DATASOURCE_PASSWORD:stockbar}
  jpa:
    defer-datasource-initialization: ${SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION:false}
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/stockbar}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/stockbar/protocol/openid-connect/certs}
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    keycloak:
      resource-client-id: ${KEYCLOAK_RESOURCE_CLIENT_ID:stockbar-api}

game:
  events:
    enabled: ${GAME_EVENTS_ENABLED:false}
    fixed-rate-millis: ${GAME_EVENTS_FIXED_RATE_MILLIS:60000}
  market-engine:
    enabled: ${GAME_MARKET_ENGINE_ENABLED:true}
    update-rate-millis: ${GAME_MARKET_ENGINE_UPDATE_RATE_MILLIS:30000}
    pressure-lookback-seconds: ${GAME_MARKET_ENGINE_PRESSURE_LOOKBACK_SECONDS:60}
    buy-impact-factor: ${GAME_MARKET_ENGINE_BUY_IMPACT_FACTOR:0.002}
    sell-impact-factor: ${GAME_MARKET_ENGINE_SELL_IMPACT_FACTOR:0.0025}
    max-pressure-impact-pct: ${GAME_MARKET_ENGINE_MAX_PRESSURE_IMPACT_PCT:0.08}
    reversion-rate-pct: ${GAME_MARKET_ENGINE_REVERSION_RATE_PCT:0.01}
    min-price-multiplier: ${GAME_MARKET_ENGINE_MIN_PRICE_MULTIPLIER:0.20}
    max-price-multiplier: ${GAME_MARKET_ENGINE_MAX_PRICE_MULTIPLIER:5.00}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.springframework: WARN
    com.zaxxer.hikari: WARN
    org.hibernate.orm.jdbc.bind: WARN

# Legacy Stock Bar price engine. Disabled by default because Merchant Exchange
# Survival uses game.market-engine instead.
price:
  legacy-enabled: false
  # Subida gradual por unidad vendida
  impact-factor:       0.005     # 0.5 % por unidad

  # Techo y suelo simétricos respecto al basePrice
  max-multiplier:      1.20      # +20 %
  min-multiplier:      0.80      # –20 %

  # Schedulers
  update-rate-millis:   30000    # cada 30 s para actualizar precios
  degrade-rate-millis:  30000    # cada 30 s para degradar precios

  # Degradación por inactividad
  degrade-threshold-seconds: 60  # 1 min sin venta antes de degradar
  degrade-per-minute-pct:     0.01   # 1 % de caída por minuto
  degrade-max-pct:           0.30    # hasta –30 % como máximo

  # Happy Hour: ventanas especiales con parámetros propios
  happy-hours:
    - start: "18:00"
    
      end:   "20:00"
      impact-factor:          0.010  # 1 % por unidad durante happy hour
      max-multiplier:         1.30   # hasta +30 % como máximo
      degrade-threshold-seconds: 120  # 2 min sin venta antes de degradar
      degrade-per-minute-pct:    0.005 # 0.5 % de caída por minuto
      initial-discount-pct:      0.10  # 10 % de descuento inmediato al arrancar
