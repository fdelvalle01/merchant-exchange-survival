spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stockbar
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.springframework: WARN
    com.zaxxer.hikari: WARN
    org.hibernate.orm.jdbc.bind: WARN
