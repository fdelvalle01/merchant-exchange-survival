services:
  postgres:
    image: postgres:16-alpine
    container_name: merchant-exchange-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockbar
      POSTGRES_USER: stockbar
      POSTGRES_PASSWORD: stockbar
    ports:
      - "5432:5432"
    volumes:
      - merchant-exchange-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbar -d stockbar"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: merchant-exchange-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --hostname=http://localhost:8081
      - --hostname-strict=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      JAVA_OPTS_APPEND: "-Xms128m -Xmx512m"
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak/stockbar-realm.json:/opt/keycloak/data/import/stockbar-realm.json:ro
      - merchant-exchange-keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./stock-bar-backend
    container_name: merchant-exchange-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockbar
      SPRING_DATASOURCE_USERNAME: stockbar
      SPRING_DATASOURCE_PASSWORD: stockbar
      SPRING_SQL_INIT_MODE: always
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      KEYCLOAK_ISSUER_URI: http://localhost:8081/realms/stockbar
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/stockbar/protocol/openid-connect/certs
      KEYCLOAK_RESOURCE_CLIENT_ID: stockbar-api
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx512m -XX:MaxMetaspaceSize=256m"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v3/api-docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./stock-bar-frontend
    container_name: merchant-exchange-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_KEYCLOAK_URL: http://localhost:8081
      VITE_KEYCLOAK_REALM: stockbar
      VITE_KEYCLOAK_CLIENT_ID: stockbar-frontend
    ports:
      - "5173:5173"

volumes:
  merchant-exchange-postgres-data:
  merchant-exchange-keycloak-data:
